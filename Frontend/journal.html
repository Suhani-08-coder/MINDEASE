<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>My Journal - MindEase</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 
                        serif: ['"Playfair Display"', 'serif'],
                        sans: ['Lato', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background: url('https://images.unsplash.com/photo-1511497584788-876760111969?q=80&w=2000&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            color: white;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(to bottom, rgba(15, 23, 42, 0.4), rgba(15, 23, 42, 0.8));
            z-index: -1;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            height: 100vh;
            width: 220px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding: 30px 20px;
            z-index: 50;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 50px;
            text-decoration: none;
            padding-left: 10px;
        }

        .nav-logo {
            width: 40px;
            height: 40px;
            background: white;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: #1e293b;
            font-weight: bold;
        }

        .brand-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            color: white;
            letter-spacing: 1px;
        }

        .nav-icon {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 15px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 1.3rem;
            margin-bottom: 10px;
            transition: all 0.3s;
            text-decoration: none;
            border-radius: 12px;
        }

        .nav-icon span {
            font-family: 'Lato', sans-serif;
            font-size: 1rem;
            font-weight: 400;
        }

        .nav-icon:hover, .nav-icon.active {
            background: rgba(255, 255, 255, 0.15);
            color: white;
        }

        .main-container {
            margin-left: 220px;
            padding: 60px 80px;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
        }

        .journal-entry {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            transition: 0.3s;
        }

        .journal-entry:hover {
            border-color: rgba(255, 255, 255, 0.3);
        }

        @media (max-width: 768px) {
            .sidebar { width: 100%; height: 70px; bottom: 0; top: auto; flex-direction: row; padding: 0 10px; }
            .nav-brand, .nav-icon span { display: none; }
            .nav-icon { justify-content: center; width: auto; margin-bottom: 0; }
            .main-container { margin-left: 0; padding: 40px 20px 100px 20px; }
        }
    </style>
</head>

<body class="bg-slate-900">

    <div class="overlay"></div>

    <nav class="sidebar">
        <a href="Welcome.html" class="nav-brand">
            <div class="nav-logo">M</div>
            <span class="brand-name">MindEase</span>
        </a>

        <a href="Welcome.html" class="nav-icon">
            <i>○</i><span>Home</span>
        </a>
        <a href="resources.html" class="nav-icon">
            <i>≋</i><span>Breath</span>
        </a>
        <a href="relax.html" class="nav-icon">
            <i>△</i><span>Relax</span>
        </a>
        <a href="journal.html" class="nav-icon active">
            <i>✎</i><span>Journal</span>
        </a>
        <a href="location.html" class="nav-icon">
            <i>◇</i><span>Centres</span>
        </a>
        
        <div class="mt-auto w-full">
            <button onclick="logout()" class="nav-icon" style="color: #fca5a5; background: transparent; border: none; cursor: pointer;">
                <i>✕</i><span>Logout</span>
            </button>
        </div>
    </nav>

    <div class="main-container">
        <div class="max-w-3xl">
            <h1 class="text-4xl font-serif mb-2">My Journal ✨</h1>
            <p class="text-white/60 mb-8 font-light">A safe space for your thoughts and reflections.</p>

            <div class="glass-panel mb-12">
                <textarea id="journalText" 
                    placeholder="What's on your mind? Write freely..."
                    class="w-full h-40 p-4 bg-transparent border-b border-white/20 resize-none outline-none font-serif text-xl leading-relaxed">
                </textarea>

                <div class="flex flex-wrap items-center justify-between mt-6 gap-4">
                    <div class="flex items-center gap-3">
                        <span class="text-sm uppercase tracking-widest opacity-50">Mood</span>
                        <select id="journalMood" class="p-2 bg-white/10 border border-white/20 rounded-lg text-sm outline-none cursor-pointer hover:bg-white/20 transition">
                            <option value="radiant">Radiant ✨</option>
                            <option value="peaceful">Peaceful 🌿</option>
                            <option value="cloudy">Cloudy ☁️</option>
                            <option value="heavy">Heavy 🌧️</option>
                            <option value="stormy">Stormy ⛈️</option>
                        </select>
                    </div>
                    
                    <button onclick="saveJournal()" class="px-8 py-3 bg-white text-slate-900 rounded-full font-bold uppercase text-xs tracking-widest hover:scale-105 transition-transform shadow-xl">
                        Save Entry
                    </button>
                </div>
                <p id="status" class="mt-4 text-green-400 text-sm font-light hidden italic">Your reflection has been preserved. ✔</p>
            </div>

            <h2 class="text-2xl font-serif mb-6 opacity-80">Past Reflections</h2>
            <div id="journalList" class="space-y-6"></div>
        </div>
    </div>

    <script>
        const BACKEND_URL = "http://127.0.0.1:5000/api";
        const userEmail = localStorage.getItem("userEmail");

        function saveJournal() {
            const thought = document.getElementById("journalText").value;
            const mood = document.getElementById("journalMood").value;

            if (!thought.trim()) return alert("Please write something before saving.");
            if (!userEmail) return alert("You must be logged in to save entries.");

            fetch(`${BACKEND_URL}/save-journal`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ thought, mood, email: userEmail })
            })
            .then(res => {
                if (!res.ok) throw new Error('Network response was not ok');
                return res.json();
            })
            .then(() => {
                document.getElementById("status").classList.remove("hidden");
                document.getElementById("journalText").value = "";
                setTimeout(() => document.getElementById("status").classList.add("hidden"), 3000);
                loadJournals();
            })
            .catch(err => console.error("Error saving journal:", err));
        }

        function loadJournals() {
            if (!userEmail) return;

            fetch(`${BACKEND_URL}/journals/${userEmail}`)
            .then(res => res.json())
            .then(data => {
                const box = document.getElementById("journalList");
                box.innerHTML = data.length ? "" : '<p class="opacity-40 italic">Your story begins here...</p>';

                data.forEach(j => {
                    box.innerHTML += `
                        <div class="journal-entry">
                            <p class="font-serif text-lg leading-relaxed mb-4">${j.thought}</p>
                            <div class="flex justify-between items-center text-xs uppercase tracking-widest opacity-50">
                                <span>${j.mood} • ${j.date}</span>
                                <button onclick="deleteJournal('${j.id}')" class="text-red-300 hover:text-red-500 transition-colors">
                                    Remove
                                </button>
                            </div>
                        </div>
                    `;
                });
            })
            .catch(err => console.error("Error loading journals:", err));
        }

        function deleteJournal(id) {
            if (confirm("Are you sure you want to remove this entry?")) {
                fetch(`${BACKEND_URL}/journal/${id}`, { method: "DELETE" })
                .then(() => loadJournals())
                .catch(err => console.error("Error deleting journal:", err));
            }
        }
        
        (function() {
            const userEmail = localStorage.getItem("userEmail");
            if (!userEmail) {
                
                window.location.href = "loginPage.html";
            }
        })();
    </script>
</body>
</html>
